<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble To-Do</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0b1026;
    --bg-mid: #111b3d;
    --text-light: #e8ecf8;
    --text-muted: #8892b0;
    --accent-cyan: #64ffda;
    --accent-pink: #ff6bb5;
    --accent-blue: #82b1ff;
    --accent-purple: #c792ea;
    --accent-yellow: #ffe082;
    --accent-orange: #ffab70;
    --glass-bg: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-light);
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 80%, rgba(100, 255, 218, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 500px 500px at 80% 20%, rgba(199, 146, 234, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(130, 177, 255, 0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Input area */
  #input-area {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 20px 24px 28px;
    background: linear-gradient(to top, var(--bg-deep) 60%, transparent);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #input-area textarea {
    flex: 1;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    padding: 14px 18px;
    color: var(--text-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    height: 52px;
    max-height: 140px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    line-height: 1.4;
  }

  #input-area textarea::placeholder {
    color: var(--text-muted);
    font-style: italic;
  }

  #input-area textarea:focus {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
  }

  #input-area button {
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    border: none;
    color: var(--bg-deep);
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 14px;
    padding: 14px 24px;
    border-radius: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 0.5px;
  }

  #input-area button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(100, 255, 218, 0.25);
  }

  #input-area button:active {
    transform: scale(0.97);
  }

  /* Bubble canvas */
  #bubble-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
  }

  /* Bubbles */
  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease-out, box-shadow 0.3s;
    will-change: transform;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .bubble:hover {
    transform: scale(1.08) !important;
    z-index: 50;
  }

  .bubble:hover::after {
    content: '✓ click to complete';
    position: absolute;
    bottom: -26px;
    font-size: 11px;
    color: var(--accent-cyan);
    white-space: nowrap;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
    opacity: 0.8;
  }

  .bubble span {
    font-family: 'Caveat', cursive;
    font-weight: 600;
    padding: 16px;
    line-height: 1.2;
    pointer-events: none;
  }

  /* Pop animation */
  .bubble.popping {
    animation: pop 0.5s ease-out forwards;
    pointer-events: none;
  }

  @keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    30% { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* Particles on pop */
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 60;
  }

  /* Completed tasks area */
  #completed-area {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 90;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    width: 280px;
    scrollbar-width: none;
  }

  #completed-area::-webkit-scrollbar { display: none; }

  #completed-header {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding: 8px 12px;
    display: none;
  }

  .completed-item {
    font-family: 'Caveat', cursive;
    font-size: 18px;
    color: var(--text-muted);
    text-decoration: line-through;
    text-decoration-color: rgba(100, 255, 218, 0.4);
    text-decoration-thickness: 2px;
    padding: 6px 12px;
    opacity: 0;
    transform: translateX(30px);
    animation: slideIn 0.5s ease-out forwards;
    position: relative;
    line-height: 1.3;
  }

  .completed-item::before {
    content: '✓';
    color: var(--accent-cyan);
    margin-right: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    opacity: 0.6;
  }

  @keyframes slideIn {
    to { opacity: 0.7; transform: translateX(0); }
  }

  /* Title */
  #title {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 90;
    pointer-events: none;
  }

  #title h1 {
    font-family: 'Caveat', cursive;
    font-size: 36px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #title p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.3px;
  }

  /* Counter */
  #counter {
    position: fixed;
    bottom: 96px;
    left: 28px;
    z-index: 90;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }

  #counter strong {
    color: var(--accent-cyan);
    font-weight: 500;
  }
</style>
</head>
<body>

<div id="title">
  <h1>Bubble Todo</h1>
  <p>Add tasks below — pop them when done</p>
</div>

<div id="bubble-canvas"></div>

<div id="completed-area">
  <div id="completed-header">Completed</div>
</div>

<div id="counter"></div>

<div id="input-area">
  <textarea id="task-input" placeholder="Type tasks, one per line…&#10;e.g. Buy groceries&#10;     Finish report&#10;     Call mom" rows="1"></textarea>
  <button id="add-btn">Add Bubbles</button>
</div>

<script>
const canvas = document.getElementById('bubble-canvas');
const input = document.getElementById('task-input');
const addBtn = document.getElementById('add-btn');
const completedArea = document.getElementById('completed-area');
const completedHeader = document.getElementById('completed-header');
const counterEl = document.getElementById('counter');

const COLORS = [
  { bg: 'rgba(100,255,218,0.12)', border: 'rgba(100,255,218,0.35)', text: '#a8fff0', shadow: 'rgba(100,255,218,0.15)' },
  { bg: 'rgba(255,107,181,0.12)', border: 'rgba(255,107,181,0.35)', text: '#ffb3d9', shadow: 'rgba(255,107,181,0.15)' },
  { bg: 'rgba(130,177,255,0.12)', border: 'rgba(130,177,255,0.35)', text: '#b3d1ff', shadow: 'rgba(130,177,255,0.15)' },
  { bg: 'rgba(199,146,234,0.12)', border: 'rgba(199,146,234,0.35)', text: '#dbc4f0', shadow: 'rgba(199,146,234,0.15)' },
  { bg: 'rgba(255,224,130,0.12)', border: 'rgba(255,224,130,0.35)', text: '#fff0b3', shadow: 'rgba(255,224,130,0.15)' },
  { bg: 'rgba(255,171,112,0.12)', border: 'rgba(255,171,112,0.35)', text: '#ffd4b3', shadow: 'rgba(255,171,112,0.15)' },
];

let bubbles = [];
let totalTasks = 0;
let completedTasks = 0;
let animFrame;

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = '52px';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});

addBtn.addEventListener('click', addTasks);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) {
    e.preventDefault();
    addTasks();
  }
});

function addTasks() {
  const text = input.value.trim();
  if (!text) return;

  const tasks = text.split('\n').map(t => t.trim()).filter(t => t.length > 0);
  tasks.forEach((task, i) => {
    setTimeout(() => createBubble(task), i * 120);
  });

  totalTasks += tasks.length;
  updateCounter();
  input.value = '';
  input.style.height = '52px';
}

function createBubble(text) {
  const color = COLORS[Math.floor(Math.random() * COLORS.length)];
  const size = Math.max(100, Math.min(180, 90 + text.length * 4));
  const fontSize = size < 120 ? 16 : size < 150 ? 19 : 22;

  const el = document.createElement('div');
  el.className = 'bubble';

  const safeArea = {
    left: 40,
    top: 90,
    right: window.innerWidth - size - 300,
    bottom: window.innerHeight - size - 110,
  };

  const x = safeArea.left + Math.random() * (safeArea.right - safeArea.left);
  const y = safeArea.top + Math.random() * (safeArea.bottom - safeArea.top);

  el.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${x}px;
    top: ${y}px;
    background: ${color.bg};
    border: 1.5px solid ${color.border};
    box-shadow: 0 4px 30px ${color.shadow}, inset 0 0 30px rgba(255,255,255,0.03);
    opacity: 0;
    transform: scale(0);
  `;

  const span = document.createElement('span');
  span.textContent = text;
  span.style.fontSize = fontSize + 'px';
  span.style.color = color.text;
  el.appendChild(span);

  canvas.appendChild(el);

  // Animate in
  requestAnimationFrame(() => {
    el.style.transition = 'opacity 0.5s ease-out, transform 0.5s cubic-bezier(0.34,1.56,0.64,1)';
    el.style.opacity = '1';
    el.style.transform = 'scale(1)';
  });

  const bubble = {
    el,
    x,
    y,
    size,
    text,
    color,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    phase: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.005 + Math.random() * 0.008,
    wobbleAmp: 8 + Math.random() * 12,
  };

  el.addEventListener('click', () => popBubble(bubble));
  bubbles.push(bubble);

  if (!animFrame) startAnimation();
}

function popBubble(bubble) {
  const { el, x, y, size, text, color } = bubble;

  // Particles
  const cx = x + size / 2;
  const cy = y + size / 2;
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (Math.PI * 2 * i) / 14 + Math.random() * 0.4;
    const dist = 40 + Math.random() * 80;
    const pSize = 3 + Math.random() * 6;
    p.style.cssText = `
      width: ${pSize}px;
      height: ${pSize}px;
      left: ${cx}px;
      top: ${cy}px;
      background: ${color.border};
      box-shadow: 0 0 6px ${color.shadow};
      transition: all 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      opacity: 1;
    `;
    canvas.appendChild(p);
    requestAnimationFrame(() => {
      p.style.left = (cx + Math.cos(angle) * dist) + 'px';
      p.style.top = (cy + Math.sin(angle) * dist) + 'px';
      p.style.opacity = '0';
      p.style.transform = `scale(0)`;
    });
    setTimeout(() => p.remove(), 800);
  }

  el.classList.add('popping');
  setTimeout(() => el.remove(), 600);

  bubbles = bubbles.filter(b => b !== bubble);

  // Add to completed list
  completedHeader.style.display = 'block';
  const item = document.createElement('div');
  item.className = 'completed-item';
  item.textContent = text;
  completedArea.appendChild(item);

  completedTasks++;
  updateCounter();

  if (bubbles.length === 0) cancelAnimationFrame(animFrame), animFrame = null;
}

function updateCounter() {
  if (totalTasks === 0) {
    counterEl.textContent = '';
    return;
  }
  const remaining = totalTasks - completedTasks;
  counterEl.innerHTML = `<strong>${completedTasks}</strong> done · ${remaining} floating`;
}

function startAnimation() {
  function animate() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    const now = Date.now();

    for (const b of bubbles) {
      b.phase += b.wobbleSpeed;

      // Gentle drift
      b.x += b.vx;
      b.y += b.vy;

      // Wobble
      const wobbleX = Math.sin(b.phase) * b.wobbleAmp;
      const wobbleY = Math.cos(b.phase * 0.7) * b.wobbleAmp * 0.6;

      // Bounce off edges
      const margin = 20;
      if (b.x < margin) { b.x = margin; b.vx *= -1; }
      if (b.x > W - b.size - 300) { b.x = W - b.size - 300; b.vx *= -1; }
      if (b.y < 80) { b.y = 80; b.vy *= -1; }
      if (b.y > H - b.size - 110) { b.y = H - b.size - 110; b.vy *= -1; }

      // Simple repulsion between bubbles
      for (const other of bubbles) {
        if (other === b) continue;
        const dx = (b.x + b.size/2) - (other.x + other.size/2);
        const dy = (b.y + b.size/2) - (other.y + other.size/2);
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = (b.size + other.size) / 2 + 10;
        if (dist < minDist && dist > 0) {
          const force = (minDist - dist) * 0.01;
          b.vx += (dx / dist) * force;
          b.vy += (dy / dist) * force;
        }
      }

      // Dampen velocity
      b.vx *= 0.998;
      b.vy *= 0.998;

      const finalX = b.x + wobbleX;
      const finalY = b.y + wobbleY;
      b.el.style.left = finalX + 'px';
      b.el.style.top = finalY + 'px';
    }

    animFrame = requestAnimationFrame(animate);
  }
  animate();
}

// Focus input on load
setTimeout(() => input.focus(), 300);
</script>
</body>
</html>
